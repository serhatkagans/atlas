<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="GençTek Atlas — Türkiye genelindeki GençTek etkinliklerini ve öğrenci projelerini keşfet." />
  <title>GençTek Atlas</title>

  <!-- Preconnect for Firebase -->
  <link rel="preconnect" href="https://firestore.googleapis.com" />
  <link rel="preconnect" href="https://storage.googleapis.com" />

  <style>
    /* ── CSS Reset ───────────────────────────────────────────────────── */
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    /* ── Temel tipografi ve renkler ─────────────────────────────────── */
    :root {
      --color-bg:        #0d1117;
      --color-surface:   #161b22;
      --color-border:    #30363d;
      --color-text:      #e6edf3;
      --color-muted:     #8b949e;
      --color-accent:    #2ea043;
      --color-accent-2:  #1f6feb;
      --font-sans:       'Segoe UI', system-ui, -apple-system, sans-serif;
      --font-mono:       'Cascadia Code', 'Fira Code', monospace;
      --radius:          8px;
      --stats-height:    48px;
      --sidebar-width:   360px;
    }

    html, body {
      height: 100%;
      font-family: var(--font-sans);
      background: var(--color-bg);
      color: var(--color-text);
      line-height: 1.5;
      -webkit-font-smoothing: antialiased;
    }

    /* ── Uygulama kabuğu ────────────────────────────────────────────── */
    #app {
      display: flex;
      flex-direction: column;
      height: 100vh;
      overflow: hidden;
    }

    /* ── İstatistik şeridi (üst) ────────────────────────────────────── */
    #stats-bar {
      flex-shrink: 0;
      height: var(--stats-height);
      background: var(--color-surface);
      border-bottom: 1px solid var(--color-border);
      display: flex;
      align-items: center;
      padding: 0 1.25rem;
      gap: 2rem;
      font-size: 0.8125rem;
      color: var(--color-muted);
    }

    #stats-bar .stat-item {
      display: flex;
      align-items: center;
      gap: 0.4rem;
    }

    #stats-bar .stat-value {
      font-weight: 600;
      color: var(--color-accent);
      font-variant-numeric: tabular-nums;
    }

    #stats-bar .brand {
      font-weight: 700;
      font-size: 0.9375rem;
      color: var(--color-text);
      margin-right: auto;
      letter-spacing: -0.01em;
    }

    /* ── Ana içerik alanı ───────────────────────────────────────────── */
    #main-layout {
      display: flex;
      flex: 1;
      overflow: hidden;
    }

    /* ── Harita konteyneri ──────────────────────────────────────────── */
    #map-container {
      flex: 1;
      position: relative;
      overflow: hidden;
      background: var(--color-bg);
    }

    #map-container .map-placeholder {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 0.75rem;
      color: var(--color-muted);
      font-size: 0.875rem;
    }

    #map-container .map-placeholder svg {
      opacity: 0.25;
    }

    /* ── İçerik paneli (sağ kenar çubuğu) ──────────────────────────── */
    #content-area {
      width: var(--sidebar-width);
      flex-shrink: 0;
      background: var(--color-surface);
      border-left: 1px solid var(--color-border);
      overflow-y: auto;
      display: flex;
      flex-direction: column;
    }

    #content-area .panel-header {
      padding: 1rem 1.25rem 0.75rem;
      border-bottom: 1px solid var(--color-border);
      font-size: 0.875rem;
      font-weight: 600;
      color: var(--color-text);
      position: sticky;
      top: 0;
      background: var(--color-surface);
      z-index: 1;
    }

    #content-area .panel-body {
      padding: 1rem 1.25rem;
      flex: 1;
    }

    #content-area .empty-state {
      color: var(--color-muted);
      font-size: 0.8125rem;
      text-align: center;
      padding: 2rem 0;
    }

    /* ── Yükleme göstergesi ─────────────────────────────────────────── */
    #loading-overlay {
      position: fixed;
      inset: 0;
      background: var(--color-bg);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 1rem;
      z-index: 9999;
      transition: opacity 0.3s ease;
    }

    #loading-overlay.hidden {
      opacity: 0;
      pointer-events: none;
    }

    .spinner {
      width: 40px;
      height: 40px;
      border: 3px solid var(--color-border);
      border-top-color: var(--color-accent);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    /* ── Duyarlı düzen ──────────────────────────────────────────────── */
    @media (max-width: 768px) {
      #main-layout {
        flex-direction: column;
      }

      #content-area {
        width: 100%;
        border-left: none;
        border-top: 1px solid var(--color-border);
        max-height: 40vh;
      }
    }
  </style>
</head>
<body>

  <!-- Yükleme ekranı -->
  <div id="loading-overlay" role="status" aria-label="Yükleniyor">
    <div class="spinner"></div>
    <span style="color: var(--color-muted); font-size: 0.875rem;">Atlas yükleniyor…</span>
  </div>

  <!-- Uygulama kabuğu -->
  <div id="app">

    <!-- İstatistik şeridi -->
    <header id="stats-bar" role="banner">
      <span class="brand">GençTek Atlas</span>

      <span class="stat-item">
        <svg width="12" height="12" viewBox="0 0 16 16" fill="currentColor" aria-hidden="true">
          <path d="M8 0a8 8 0 1 1 0 16A8 8 0 0 1 8 0Zm.5 4.75a.75.75 0 0 0-1.5 0v3.5a.75.75 0 0 0 .22.53l2.25 2.25a.75.75 0 1 0 1.06-1.06L8.5 7.94V4.75Z"/>
        </svg>
        Etkinlikler:
        <strong class="stat-value" id="stat-events">—</strong>
      </span>

      <span class="stat-item">
        <svg width="12" height="12" viewBox="0 0 16 16" fill="currentColor" aria-hidden="true">
          <path d="M2 2.5A2.5 2.5 0 0 1 4.5 0h8.75a.75.75 0 0 1 .75.75v12.5a.75.75 0 0 1-.75.75h-2.5a.75.75 0 0 1 0-1.5h1.75v-2h-8a1 1 0 0 0-.714 1.7.75.75 0 1 1-1.072 1.05A2.495 2.495 0 0 1 2 11.5Zm10.5-1h-8a1 1 0 0 0-1 1v6.708A2.486 2.486 0 0 1 4.5 9h8V1.5Z"/>
        </svg>
        Projeler:
        <strong class="stat-value" id="stat-projects">—</strong>
      </span>

      <span class="stat-item">
        <svg width="12" height="12" viewBox="0 0 16 16" fill="currentColor" aria-hidden="true">
          <path d="M1.75 0h3.5C6.216 0 7 .784 7 1.75v3.5A1.75 1.75 0 0 1 5.25 7H4v4a1 1 0 0 0 1 1h4v-1.25C9 9.784 9.784 9 10.75 9h3.5c.966 0 1.75.784 1.75 1.75v3.5A1.75 1.75 0 0 1 14.25 16h-3.5A1.75 1.75 0 0 1 9 14.25V13H5a2.5 2.5 0 0 1-2.5-2.5V7h-.25A1.75 1.75 0 0 1 0 5.25v-3.5C0 .784.784 0 1.75 0Z"/>
        </svg>
        İl:
        <strong class="stat-value" id="stat-cities">—</strong>
      </span>
    </header>

    <!-- Ana düzen -->
    <div id="main-layout">

      <!-- Türkiye haritası -->
      <main id="map-container" role="main" aria-label="Türkiye Haritası">
        <div class="map-placeholder">
          <svg width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1" aria-hidden="true">
            <circle cx="12" cy="12" r="10"/>
            <line x1="2" y1="12" x2="22" y2="12"/>
            <path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/>
          </svg>
          <span>Harita yükleniyor…</span>
        </div>
      </main>

      <!-- İçerik / detay paneli -->
      <aside id="content-area" aria-label="Etkinlik ve Proje Detayları">
        <div class="panel-header">Keşfet</div>
        <div class="panel-body">
          <p class="empty-state">Haritadan bir il seçerek etkinlik ve projeleri görüntüleyin.</p>
        </div>
      </aside>

    </div>
  </div>

  <!-- ── Firebase v9 Modular SDK (CDN) ─────────────────────────────── -->
  <script type="module">
    import { initializeApp }            from 'https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js';
    import { getFirestore,
             collection, query, where,
             getDocs, addDoc,
             serverTimestamp }          from 'https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js';
    import { getStorage,
             ref, uploadBytes,
             getDownloadURL }           from 'https://www.gstatic.com/firebasejs/10.12.2/firebase-storage.js';
    import { getAuth, signInAnonymously } from 'https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js';
    import { getAnalytics }             from 'https://www.gstatic.com/firebasejs/10.12.2/firebase-analytics.js';

    // ── Firebase yapılandırması ─────────────────────────────────────
    const firebaseConfig = {
      apiKey:            "AIzaSyB4LDanE4IryqEwW-kP_z_Q0a1sDmdvQjs",
      authDomain:        "genctek-atlas.firebaseapp.com",
      projectId:         "genctek-atlas",
      storageBucket:     "genctek-atlas.firebasestorage.app",
      messagingSenderId: "627647479769",
      appId:             "1:627647479769:web:5ecbe009f9ed6d028f63c8"
    };

    const app       = initializeApp(firebaseConfig);
    const db        = getFirestore(app);
    const storage   = getStorage(app);
    const auth      = getAuth(app);
    const analytics = getAnalytics(app);

    // ── Anonim oturum ────────────────────────────────────────────────
    await signInAnonymously(auth);

    // ── İstatistikleri yükle ─────────────────────────────────────────
    async function loadStats() {
      const [eventsSnap, projectsSnap] = await Promise.all([
        getDocs(query(collection(db, 'events'),   where('onaylandi', '==', true))),
        getDocs(query(collection(db, 'projects'), where('onaylandi', '==', true)))
      ]);

      const cities = new Set(eventsSnap.docs.map(d => d.data().il).filter(Boolean));

      document.getElementById('stat-events').textContent   = eventsSnap.size;
      document.getElementById('stat-projects').textContent = projectsSnap.size;
      document.getElementById('stat-cities').textContent   = cities.size;
    }

    // ── Uygulama hazır ───────────────────────────────────────────────
    async function init() {
      try {
        await loadStats();
      } catch (err) {
        console.error('Atlas başlatma hatası:', err);
      } finally {
        const overlay = document.getElementById('loading-overlay');
        overlay.classList.add('hidden');
        setTimeout(() => overlay.remove(), 400);
      }
    }

    // Atlas global nesnesini diğer modüllere aç
    window.Atlas = { app, db, storage, auth, analytics,
                     collection, query, where, getDocs, addDoc, serverTimestamp,
                     ref, uploadBytes, getDownloadURL };

    init();
  </script>

</body>
</html>
